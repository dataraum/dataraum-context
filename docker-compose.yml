# DataRaum platform substrate — L1 (DAT-320).
#
# Two services: postgres (platform + DuckLake catalog DBs) and control-plane
# (FastAPI /health placeholder; real subsystems wired in by L2+).
# DuckLake uses local-FS object store via the dataraum_lake named volume —
# rustfs / S3 deferred to post-spine.
#
# First run:
#   cp .env.example .env
#   docker compose up -d --wait
#   curl http://127.0.0.1:8000/health   # → {"status":"ok"}

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DUCKLAKE_CATALOG_DB: ${DUCKLAKE_CATALOG_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: docker/control-plane.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL is consumed by SQLAlchemy (workspace + sessions); the
      # +psycopg dialect prefix is required — we ship psycopg v3, not psycopg2,
      # and the bare postgresql:// scheme falls back to the missing psycopg2
      # driver. DUCKLAKE_CATALOG_URL is consumed by DuckDB's postgres
      # extension (libpq), which accepts the bare postgresql:// scheme.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      DUCKLAKE_DATA_PATH: /var/lib/dataraum/lake
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dataraum_lake:/var/lib/dataraum/lake
      - ${HOST_SOURCES_DIR:-./sources}:/var/lib/dataraum/sources:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  dataraum_lake:
