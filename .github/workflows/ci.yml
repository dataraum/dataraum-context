name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  echo "${{ matrix.python-version }}" > .python-version
                  uv sync --group dev

            - name: Ruff check
              run: uv run ruff check src/

            - name: Ruff format check
              run: uv run ruff format --check src/

            - name: Type check
              run: uv run mypy src/

            - name: Dead code check (vulture)
              run: |
                  output=$(uv run vulture src/dataraum vulture_whitelist.py --min-confidence 80 2>&1 \
                    | grep -v "unreachable code after 'while'" || true)
                  if [ -n "$output" ]; then
                    echo "$output"
                    exit 1
                  fi

            - name: Run tests with coverage
              run: uv run pytest tests/unit tests/integration -q --cov --cov-report=term-missing --cov-report=xml

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report-${{ matrix.python-version }}
                  path: coverage.xml

    # Single status for branch protection (matrix jobs report as "check (3.x)")
    check:
        if: always()
        needs: [test, docs]
        runs-on: ubuntu-latest
        steps:
            - name: All checks passed
              run: |
                  if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.docs.result }}" != "success" ]; then
                    echo "test=${{ needs.test.result }} docs=${{ needs.docs.result }}"
                    exit 1
                  fi

    docs:
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'pull_request' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install zensical
              run: pip install zensical

            - name: Build docs
              run: zensical build --clean
