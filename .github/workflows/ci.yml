name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Install dependencies
              run: |
                  echo "3.14" > .python-version
                  uv sync --group dev

            - name: Ruff check
              run: uv run ruff check src/

            - name: Ruff format check
              run: uv run ruff format --check src/

            - name: Dead code check (vulture)
              run: |
                  output=$(uv run vulture src/dataraum vulture_whitelist.py --min-confidence 80 2>&1 \
                    | grep -v "unreachable code after 'while'" || true)
                  if [ -n "$output" ]; then
                    echo "$output"
                    exit 1
                  fi

            - name: Run tests with coverage
              run: uv run pytest tests/unit tests/integration -q --cov --cov-report=term-missing --cov-report=xml

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage.xml

    docs:
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'pull_request' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Install zensical
              run: pip install zensical

            - name: Build docs
              run: zensical build --clean
