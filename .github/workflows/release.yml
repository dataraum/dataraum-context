name: Release

on:
    release:
        types: [published]

jobs:
    preflight:
        name: Preflight (version match + server.json validate)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Check tag == pyproject version == server.json version
              run: |
                  set -e
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
                  SERVER_VERSION=$(python -c 'import json; d=json.load(open("server.json")); print(d["version"])')
                  PACKAGE_VERSION=$(python -c 'import json; d=json.load(open("server.json")); print(d["packages"][0]["version"])')

                  echo "tag=$TAG_VERSION  pyproject=$PYPROJECT_VERSION  server.json=$SERVER_VERSION  server.packages[0]=$PACKAGE_VERSION"

                  if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ] \
                  || [ "$TAG_VERSION" != "$SERVER_VERSION" ] \
                  || [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                      echo "::error::version mismatch — refusing to publish"
                      exit 1
                  fi

            - name: Validate server.json against MCP registry schema
              run: |
                  curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
                  ./mcp-publisher validate server.json

    pypi:
        name: Publish to PyPI
        needs: preflight
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

    mcp-registry:
        name: Publish to MCP Registry
        needs: pypi
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Install mcp-publisher
              run: |
                  curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

            - name: Authenticate via OIDC
              run: ./mcp-publisher login github-oidc

            - name: Publish to MCP Registry
              run: ./mcp-publisher publish

    docker:
        name: Push to GHCR
        needs: preflight
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version from tag
              id: version
              run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/dataraum/dataraum:${{ steps.version.outputs.version }}
                      ghcr.io/dataraum/dataraum:latest
