name: Release to PyPI

on:
    release:
        types: [published]

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: pypi
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
