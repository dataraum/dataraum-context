name: Release

on:
    release:
        types: [published]

jobs:
    pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

    mcp-registry:
        name: Publish to MCP Registry
        needs: pypi
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Install mcp-publisher
              run: |
                  curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

            - name: Authenticate via OIDC
              run: ./mcp-publisher login github-oidc

            - name: Publish to MCP Registry
              run: ./mcp-publisher publish

    docker:
        name: Push to GHCR
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version from tag
              id: version
              run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/dataraum/dataraum:${{ steps.version.outputs.version }}
                      ghcr.io/dataraum/dataraum:latest
