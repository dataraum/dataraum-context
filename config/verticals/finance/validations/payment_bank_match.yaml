# Payment-Bank Reconciliation
# Checks if payment amounts match bank transaction amounts

validation_id: payment_bank_match
name: Payment-Bank Amount Reconciliation
description: >
  Validates that payment amounts reconcile with corresponding bank
  transactions. Each payment should have a matching bank transaction
  with the same or similar amount.

category: financial
severity: warning
version: "1.0"

tags:
  - reconciliation
  - payments
  - bank-transactions

relevant_cycles:
  - accounts_payable
  - cash_management

check_type: aggregate

parameters:
  tolerance: 0.05

sql_hints: >
  Compare payment amounts with bank transaction amounts.

  IMPORTANT: Use the FK join path first. Look for a payment_id column
  in bank_transactions that references payments.payment_id. If this FK
  exists, join on it — do NOT fall back to fuzzy matching.

  Check semantic annotations and relationships to find the join path.

  After joining on payment_id, compare amounts:
  - payment.amount should equal ABS(bank_transaction.amount) within tolerance
  - Bank transactions use negative amounts for outflows (debits)

  Calculate the orphan rate as a FRACTION (0.0 to 1.0):
    orphan_rate = unmatched_payments / total_payments

  Return: total_payments, matched_payments, unmatched_payments, orphan_rate.

  If no FK join path exists, return orphan_rate = NULL.

expected_outcome: >
  Most payments should have corresponding bank transactions. An orphan_rate
  above 5% suggests missing bank entries or reconciliation issues.
