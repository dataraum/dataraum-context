graph_id: net_income
version: '1.0'
metadata:
  name: Net Income
  description: Bottom-line profit after all expenses, interest, and taxes
  category: profitability
  source: system
  tags:
  - profitability
  - income-statement
  - p&l
  - bottom-line
output:
  type: scalar
  metric_id: net_income
  unit: currency
  decimal_places: 0
dependencies:
  revenue:
    level: 1
    type: extract
    source:
      standard_field: revenue
      statement: income_statement
    aggregation: sum
    validation:
    - condition: value > 0
      severity: error
      message: Revenue must be positive
  cost_of_goods_sold:
    level: 1
    type: extract
    source:
      standard_field: cost_of_goods_sold
      statement: income_statement
    aggregation: sum
  operating_expense:
    level: 1
    type: extract
    source:
      standard_field: operating_expense
      statement: income_statement
    aggregation: sum
  interest:
    level: 1
    type: extract
    source:
      standard_field: interest
      statement: income_statement
    aggregation: sum
  tax:
    level: 1
    type: extract
    source:
      standard_field: tax
      statement: income_statement
    aggregation: sum
  operating_income:
    level: 2
    type: formula
    expression: revenue - cost_of_goods_sold - operating_expense
    depends_on:
    - revenue
    - cost_of_goods_sold
    - operating_expense
  net_income:
    level: 3
    type: formula
    expression: operating_income - interest - tax
    depends_on:
    - operating_income
    - interest
    - tax
    output_step: true
interpretation:
  ranges:
  - min: -999999999
    max: -1
    label: LOSS
    description: Net loss - company unprofitable
  - min: 0
    max: 0
    label: BREAKEVEN
    description: No profit or loss
  - min: 1
    max: 999999999
    label: PROFITABLE
    description: Net profit
