graph_id: ebitda_margin
graph_type: metric
version: '1.0'
metadata:
  name: EBITDA Margin
  description: EBITDA as a percentage of revenue
  category: profitability
  source: system
  tags:
  - profitability
  - margin
  - income-statement
  - ebitda
output:
  type: scalar
  metric_id: ebitda_margin
  unit: percentage
  decimal_places: 1
dependencies:
  revenue:
    level: 1
    type: extract
    source:
      standard_field: revenue
      statement: income_statement
    aggregation: sum
    validation:
    - condition: value > 0
      severity: error
      message: Revenue must be positive for margin calculation
  cost_of_goods_sold:
    level: 1
    type: extract
    source:
      standard_field: cost_of_goods_sold
      statement: income_statement
    aggregation: sum
  operating_expense:
    level: 1
    type: extract
    source:
      standard_field: operating_expense
      statement: income_statement
    aggregation: sum
  depreciation:
    level: 1
    type: extract
    source:
      standard_field: depreciation
      statement: income_statement
    aggregation: sum
  operating_income:
    level: 2
    type: formula
    expression: revenue - cost_of_goods_sold - operating_expense
    depends_on:
    - revenue
    - cost_of_goods_sold
    - operating_expense
  ebitda:
    level: 3
    type: formula
    expression: operating_income + depreciation
    depends_on:
    - operating_income
    - depreciation
  ebitda_margin:
    level: 3
    type: formula
    expression: ebitda / revenue * 100
    depends_on:
    - ebitda
    - revenue
    output_step: true
interpretation:
  ranges:
  - min: -999
    max: 5
    label: POOR
    description: Weak cash generation relative to revenue
  - min: 5
    max: 15
    label: FAIR
    description: Moderate cash generation
  - min: 15
    max: 25
    label: GOOD
    description: Strong cash generation
  - min: 25
    max: 40
    label: EXCELLENT
    description: Very strong cash generation
  - min: 40
    max: 100
    label: EXCEPTIONAL
    description: Exceptional cash generation - asset-light business
