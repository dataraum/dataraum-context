graph_id: net_margin
graph_type: metric
version: '1.0'
metadata:
  name: Net Margin
  description: Net income as a percentage of revenue
  category: profitability
  source: system
  tags:
  - profitability
  - margin
  - income-statement
  - bottom-line
output:
  type: scalar
  metric_id: net_margin
  unit: percentage
  decimal_places: 1
dependencies:
  revenue:
    level: 1
    type: extract
    source:
      standard_field: revenue
      statement: income_statement
    aggregation: sum
    validation:
    - condition: value > 0
      severity: error
      message: Revenue must be positive for margin calculation
  cost_of_goods_sold:
    level: 1
    type: extract
    source:
      standard_field: cost_of_goods_sold
      statement: income_statement
    aggregation: sum
  operating_expense:
    level: 1
    type: extract
    source:
      standard_field: operating_expense
      statement: income_statement
    aggregation: sum
  interest:
    level: 1
    type: extract
    source:
      standard_field: interest
      statement: income_statement
    aggregation: sum
  tax:
    level: 1
    type: extract
    source:
      standard_field: tax
      statement: income_statement
    aggregation: sum
  operating_income:
    level: 2
    type: formula
    expression: revenue - cost_of_goods_sold - operating_expense
    depends_on:
    - revenue
    - cost_of_goods_sold
    - operating_expense
  net_income:
    level: 3
    type: formula
    expression: operating_income - interest - tax
    depends_on:
    - operating_income
    - interest
    - tax
  net_margin:
    level: 3
    type: formula
    expression: net_income / revenue * 100
    depends_on:
    - net_income
    - revenue
    output_step: true
interpretation:
  ranges:
  - min: -999
    max: 0
    label: LOSS
    description: Net loss - unprofitable
  - min: 0
    max: 5
    label: THIN
    description: Very thin profit margins
  - min: 5
    max: 10
    label: FAIR
    description: Moderate profitability
  - min: 10
    max: 20
    label: GOOD
    description: Strong profitability
  - min: 20
    max: 100
    label: EXCELLENT
    description: Exceptional profitability
