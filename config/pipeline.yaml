# Pipeline Configuration
#
# Orchestrator settings only. Per-phase config lives in config/phases/<name>.yaml.

version: "1.0.0"

# Active phases (display order; actual execution order determined by dependencies).
# Comment out a phase to disable it. Dependencies are defined in the phase classes.
phases:
  - import
  - typing
  - statistics
  - column_eligibility
  - statistical_quality
  - relationships
  - correlations
  - temporal
  - semantic
  - quality_review
  - enriched_views
  - slicing
  - slicing_view
  - slice_analysis
  - temporal_slice_analysis
  - quality_summary
  - analysis_review
  - entropy
  - entropy_interpretation
  - business_cycles
  - validation
  - graph_execution

# Limits
limits:
  max_columns: 500  # Overall across all tables in a pipeline run

# Pipeline orchestrator settings
pipeline:
  # Maximum phases to run in parallel (ThreadPoolExecutor workers)
  max_parallel: 4
  # Stop pipeline on first phase failure
  fail_fast: true
  # Skip phases that already have completed checkpoints
  skip_completed: true

  # Retry configuration for transient SQLite contention errors
  retry:
    max_retries: 2
    # Exponential backoff: backoff_base * (2^attempt) seconds
    backoff_base: 2.0
