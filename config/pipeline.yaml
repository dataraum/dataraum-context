# Pipeline Configuration
#
# Structural declarations for the pipeline DAG. Per-phase config lives
# in config/phases/<name>.yaml. Execution order determined by dependencies.

version: "2.0.0"

phases:
  # =========================================================================
  # Zone 1: Foundation
  # =========================================================================
  import:
    description: Load data files into raw tables
    dependencies: []

  typing:
    description: Type inference and resolution
    dependencies: [import]
    produces: [typing]
    detectors: [type_fidelity]

  statistics:
    description: Statistical profiling of typed tables
    dependencies: [typing]
    produces: [statistics]
    detectors: [null_ratio]

  column_eligibility:
    description: Column eligibility evaluation
    dependencies: [statistics]

  statistical_quality:
    description: "Benford's Law and outlier detection"
    dependencies: [column_eligibility]

  relationships:
    description: Cross-table relationship detection
    dependencies: [column_eligibility]
    produces: [relationships]

  temporal:
    description: Temporal pattern and trend analysis
    dependencies: [column_eligibility]

  semantic:
    description: LLM-powered semantic analysis
    dependencies: [relationships]
    produces: [semantic]
    detectors: [business_meaning, unit_entropy, temporal_entropy,
                outlier_rate, benford,
                join_path_determinism, relationship_entropy]

  data_fixes:
    description: Apply stored metadata fixes
    dependencies: [semantic]

  quality_review:
    description: Quality checkpoint after semantic — runs foundation entropy detectors
    dependencies: [semantic, statistical_quality]
    gate: true

  # =========================================================================
  # Zone 2: Enrichment
  # =========================================================================
  enriched_views:
    description: Create enriched views joining fact + dimension tables
    dependencies: [quality_review]
    produces: [enriched_view]
    detectors: [dimension_coverage]

  slicing:
    description: LLM-powered slice dimension identification
    dependencies: [enriched_views]

  slicing_view:
    description: Create slicing views narrowed to slice-relevant columns
    dependencies: [slicing]

  slice_analysis:
    description: Execute slice SQL and analyze slice tables
    dependencies: [slicing_view]
    produces: [slice_variance]
    detectors: [slice_variance]

  temporal_slice_analysis:
    description: Distribution drift analysis on slices
    dependencies: [slice_analysis, temporal]
    produces: [drift_summaries]
    detectors: [temporal_drift]

  correlations:
    description: Within-table correlation analysis
    dependencies: [enriched_views]
    produces: [correlation]
    detectors: [derived_value]

  quality_summary:
    description: LLM quality report generation
    dependencies: [slice_analysis, temporal_slice_analysis]
    produces: [column_quality_reports]
    detectors: [dimensional_entropy, column_quality]

  analysis_review:
    description: Quality checkpoint after enrichment — runs Zone 2 entropy detectors
    dependencies: [correlations, quality_summary, temporal_slice_analysis]
    gate: true

  # =========================================================================
  # Zone 3: Interpretation
  # =========================================================================
  entropy_interpretation:
    description: LLM interpretation of entropy
    dependencies: [computation_review]

  business_cycles:
    description: Expert LLM cycle detection
    dependencies: [analysis_review, semantic, relationships, temporal, enriched_views, slicing, quality_summary]
    produces: [business_cycles]
    detectors: [business_cycle_health]

  validation:
    description: LLM-powered validation checks
    dependencies: [analysis_review, semantic, relationships, enriched_views, slicing]
    produces: [validation]
    detectors: [cross_table_consistency]

  computation_review:
    description: Quality checkpoint after Zone 3 analysis
    dependencies: [business_cycles, validation]
    gate: true

  graph_execution:
    description: Execute metric graphs
    dependencies: [semantic, column_eligibility, statistical_quality, temporal, relationships, correlations, slicing, quality_summary, entropy_interpretation]

# Limits
limits:
  max_columns: 500  # Overall across all tables in a pipeline run

# Pipeline orchestrator settings
pipeline:
  # Maximum phases to run in parallel (ThreadPoolExecutor workers)
  max_parallel: 4
  # Stop pipeline on first phase failure
  fail_fast: true
  # Skip phases that already have completed checkpoints
  skip_completed: true

  # Retry configuration for transient SQLite contention errors
  retry:
    max_retries: 2
    # Exponential backoff: backoff_base * (2^attempt) seconds
    backoff_base: 2.0
