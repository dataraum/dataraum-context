# Entropy Contracts Configuration
#
# Contracts define acceptable entropy thresholds for different use cases.
# Each contract specifies dimension thresholds, blocking conditions,
# and overall requirements.
#
# See docs/ENTROPY_CONTRACTS.md for detailed specification.

contracts:
  # --------------------------------------------------------------------------
  # EXPLORATORY ANALYSIS
  # --------------------------------------------------------------------------
  # Most lenient contract - for data exploration and hypothesis testing
  exploratory_analysis:
    display_name: "Exploratory Analysis"
    description: "For data exploration, hypothesis testing, initial analysis"
    overall_threshold: 0.5
    warning_margin: 0.2  # Within 20% of threshold = warning

    dimension_thresholds:
      structural.types: 0.3
      structural.relations: 0.5
      semantic.business_meaning: 0.5
      semantic.units: 0.4
      semantic.temporal: 0.5
      semantic.dimensional: 0.5  # Cross-column patterns and business rules
      semantic.coverage: 0.5    # Dimension column NULL rates on enriched views
      value.nulls: 0.5
      value.outliers: 0.5
      value.distribution: 0.8   # Benford's Law compliance
      value.temporal: 0.5       # Distribution drift over time
      computational.derived_values: 0.5
      computational.reconciliation: 0.5  # Cross-table validation failures
      semantic.cycles: 0.5              # Business cycle detection quality

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.8
        description: "Any dimension with critical entropy (>0.8) blocks exploration"

  # --------------------------------------------------------------------------
  # DATA SCIENCE / ML
  # --------------------------------------------------------------------------
  # Focus on value quality; semantic ambiguity less important
  data_science:
    display_name: "Data Science / ML"
    description: "For feature engineering, model training, statistical analysis"
    overall_threshold: 0.35

    dimension_thresholds:
      structural.types: 0.2       # Types must be consistent for pipelines
      structural.relations: 0.3   # Join quality affects training data
      semantic.business_meaning: 0.5  # ML doesn't need business terms
      semantic.units: 0.3         # Units affect feature scaling
      semantic.temporal: 0.4      # Temporal patterns are features
      semantic.dimensional: 0.4   # Cross-column patterns for feature engineering
      semantic.coverage: 0.4     # NULLs in dimensions affect feature quality
      value.nulls: 0.3           # Nulls affect model quality
      value.outliers: 0.3        # Outliers affect training
      value.distribution: 0.4   # Benford deviations — informational for ML
      value.temporal: 0.3       # Distribution drift affects training data
      computational.derived_values: 0.4
      computational.reconciliation: 0.4  # Cross-table validation failures
      semantic.cycles: 0.4              # Business cycle detection quality

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.6
        description: "Type or value quality too low for ML pipelines"

  # --------------------------------------------------------------------------
  # OPERATIONAL ANALYTICS
  # --------------------------------------------------------------------------
  # For operational reports and team dashboards
  operational_analytics:
    display_name: "Operational Analytics"
    description: "For operational reports, team dashboards, process monitoring"
    overall_threshold: 0.35

    dimension_thresholds:
      structural.types: 0.2
      structural.relations: 0.3
      semantic.business_meaning: 0.3
      semantic.units: 0.3
      semantic.temporal: 0.4
      semantic.dimensional: 0.35  # Cross-column patterns affect operational reports
      semantic.coverage: 0.35    # Ops reports need reliable dimension columns
      value.nulls: 0.4
      value.outliers: 0.4
      value.distribution: 0.4   # Benford compliance
      value.temporal: 0.4       # Distribution drift
      computational.derived_values: 0.3
      computational.reconciliation: 0.4  # Cross-table validation failures
      semantic.cycles: 0.4              # Business cycle detection quality

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.6

  # --------------------------------------------------------------------------
  # AGGREGATION SAFE
  # --------------------------------------------------------------------------
  # For SUM, AVG, COUNT queries — focuses on value dimensions
  aggregation_safe:
    display_name: "Aggregation Safe"
    description: "For SUM/AVG/COUNT queries — ensures numeric types, nulls, outliers, and units are under control"
    overall_threshold: 0.35

    dimension_thresholds:
      structural.types: 0.2       # Numeric types must be resolved for aggregation
      structural.relations: 0.5   # Join quality less critical for simple aggregates
      semantic.business_meaning: 0.5  # Semantic meaning not critical for SUM/AVG
      semantic.units: 0.2         # Unit consistency is critical — can't sum kg + lbs
      semantic.temporal: 0.5      # Temporal less critical for aggregation
      semantic.dimensional: 0.4   # Cross-column patterns moderately important
      semantic.coverage: 0.4     # Dims used for GROUP BY need coverage
      value.nulls: 0.25          # Nulls directly distort COUNT/AVG
      value.outliers: 0.3        # Outliers skew averages
      value.distribution: 0.4   # Benford less critical for aggregation
      value.temporal: 0.5       # Drift less critical for point-in-time aggregates
      computational.derived_values: 0.3

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.6
        description: "Value or type dimension too uncertain for safe aggregation"

  # --------------------------------------------------------------------------
  # EXECUTIVE DASHBOARD
  # --------------------------------------------------------------------------
  # For C-level dashboards and board presentations
  executive_dashboard:
    display_name: "Executive Dashboard"
    description: "For C-level dashboards, board presentations, KPI tracking"
    overall_threshold: 0.25

    dimension_thresholds:
      structural.types: 0.2
      structural.relations: 0.2
      semantic.business_meaning: 0.2
      semantic.units: 0.2
      semantic.temporal: 0.2
      semantic.dimensional: 0.25  # Cross-column patterns must be documented for executives
      semantic.coverage: 0.25    # Execs need complete dimension data
      value.nulls: 0.3
      value.outliers: 0.3
      value.distribution: 0.3   # Benford compliance for executive reporting
      value.temporal: 0.3       # Drift must be controlled for KPI tracking
      computational.derived_values: 0.2
      computational.reconciliation: 0.2  # Cross-table validation failures — execs can't see mismatches
      semantic.cycles: 0.3              # Business cycle detection quality

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.5
        description: "Any dimension exceeding 0.5 blocks executive reporting"
  # --------------------------------------------------------------------------
  # REGULATORY REPORTING
  # --------------------------------------------------------------------------
  # Strictest contract - for compliance and audit submissions
  regulatory_reporting:
    display_name: "Regulatory Reporting"
    description: "For financial statements, compliance reports, audit submissions"
    overall_threshold: 0.1

    dimension_thresholds:
      structural.types: 0.1
      structural.relations: 0.1
      semantic.business_meaning: 0.1
      semantic.units: 0.1
      semantic.temporal: 0.1
      semantic.dimensional: 0.1  # All cross-column business rules must be documented
      semantic.coverage: 0.1    # Near-zero tolerance for dimension NULLs
      value.nulls: 0.1
      value.outliers: 0.2      # Slightly more tolerance for outliers
      value.distribution: 0.2  # Benford deviations need investigation for compliance
      value.temporal: 0.2      # Distribution drift unacceptable for regulatory
      computational.derived_values: 0.1
      computational.reconciliation: 0.1  # Cross-table validation failures — zero tolerance for regulatory
      semantic.cycles: 0.2              # Business cycle detection quality

    blocking_conditions:
      - type: any_dimension_exceeds
        threshold: 0.2
        description: "Any dimension exceeding 0.2 blocks regulatory reporting"

# --------------------------------------------------------------------------
# CUSTOM CONTRACTS
# --------------------------------------------------------------------------
# Define project-specific contracts here. They can extend existing contracts.
#
# Example:
# custom_contracts:
#   my_project_strict:
#     extends: regulatory_reporting
#     overrides:
#       dimension_thresholds:
#         value.outliers: 0.1  # Stricter outlier threshold
