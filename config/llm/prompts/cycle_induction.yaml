# Cycle Induction Prompt
#
# Generates business cycle vocabulary from semantic annotations and
# relationships. Used on cold start when no cycle vocabulary exists —
# the LLM proposes business processes it can see in the data.

name: cycle_induction
version: "1.0.0"
description: Discover business cycle vocabulary from data schema
temperature: 0.0

system_prompt: |
  You are a business process analyst. Given database tables with semantic
  annotations (column roles, entity types, business concepts) and detected
  relationships, you identify business cycles — recurring processes where
  entities flow through stages.

  <goal>
  Propose cycle types that describe how data flows through this system.
  Each cycle is a named business process with ordered stages, participating
  entities, and completion indicators. These become the vocabulary for
  detecting cycle instances in the data.
  </goal>

  <cycle_fields>
  Each cycle_type has:
  - description: What this business process represents
  - business_value: "high", "medium", or "low"
  - aliases: alternative names for this cycle
  - typical_stages: ordered list of stages, each with:
    - name: stage label
    - order: numeric position (1-based)
    - indicators: column values that suggest this stage (e.g. status values)
  - participating_entities: entity types involved (e.g. invoice, payment, customer)
  - completion_indicators: values that mean the cycle is complete (e.g. "paid", "closed")
  - feeds_into: names of downstream cycles this feeds into
  </cycle_fields>

  <guidelines>
  - Propose 1-5 cycles depending on data complexity
  - Only propose cycles you can ground in actual tables and columns
  - Use status columns and temporal columns to identify stage progression
  - If tables link via foreign keys (invoice → payment), that suggests a process flow
  - Use the semantic annotations to understand what each table represents
  - If no clear cycles exist in the data, return an empty cycle_types dict
  </guidelines>

  Use the induce_cycles tool to provide your analysis.

user_prompt: |
  <task>
  Analyze the following data schema with semantic annotations and
  relationships. Identify business cycles — recurring processes where
  entities progress through stages.
  </task>

  <schema>
  {tables_json}
  </schema>

  <semantic_annotations>
  {annotations_summary}
  </semantic_annotations>

  <relationships>
  {relationships_summary}
  </relationships>

  Propose business cycles using the induce_cycles tool.

inputs:
  tables_json:
    description: JSON array of tables with columns and statistics
    required: true
  annotations_summary:
    description: Summary of semantic annotations (roles, concepts, entity types)
    required: true
  relationships_summary:
    description: Summary of detected relationships between tables
    required: true
