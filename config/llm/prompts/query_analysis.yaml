name: "query_analysis"
version: "3.0"
description: "Analyze natural language questions and generate SQL to answer them"
temperature: 0.0

# System prompt — minimal. Intelligence lives in tool responses, not here.
system_prompt: |
  You have access to Dataraum tools for data analysis.
  Tool responses include assumptions and quality signals —
  relay these to the user when they affect confidence in results.
  When open questions are returned, present the options and let the user decide.

# User prompt - provides question and schema context
user_prompt: |
  <question>
  {question}
  </question>

  <dataset_context>
  {dataset_context}
  </dataset_context>

  {snippet_context}

  <execution_model>
  Each step's SQL becomes a temp view: CREATE TEMP VIEW <step_id> AS <sql>
  Steps execute sequentially. final_sql references them by step_id.
  Each step must be standalone SQL — no WITH clauses, no references to other steps.

  DuckDB specifics that differ from standard SQL:
  - GROUP BY: every non-aggregated SELECT column must appear in GROUP BY (use ANY_VALUE() if value doesn't matter)
  - Reserved word aliases: avoid DATE, TIME, YEAR, MONTH, DAY as aliases
  - Enriched views (enriched_*) have pre-joined columns — prefer over manual JOINs

  If knowledge base snippets are provided, reuse matching ones by setting snippet_id.
  </execution_model>

  Use the analyze_query tool to provide the SQL and your analysis.

# Input variable definitions
inputs:
  question:
    type: "string"
    required: true
    description: "The natural language question to answer"

  dataset_context:
    type: "string"
    required: true
    description: "Metadata document with schema, semantic annotations, field mappings, relationships, quality, and entropy"

  snippet_context:
    type: "string"
    required: true
    description: "SQL Knowledge Base context — either pre-fetched snippets or search vocabulary, with mode-specific instructions (empty string if none)"
