# LLM Configuration
#
# Configure LLM providers for intelligent analysis features.
# When disabled, manual YAML configuration is required.

version: "1.0.0"

# Provider configurations
providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-sonnet-4-5
    models:
      fast: claude-haiku-4-5
      balanced: claude-sonnet-4-5

# Active provider
active_provider: anthropic

# Feature toggles
features:
  column_annotation:
    enabled: true
    model_tier: fast

  semantic_analysis:
    enabled: true
    model_tier: balanced

  slicing_analysis:
    enabled: true
    model_tier: balanced

  quality_summary:
    enabled: true
    model_tier: fast

  validation:
    enabled: true
    model_tier: balanced

  business_cycles:
    enabled: true
    model_tier: balanced

  entropy_interpretation:
    enabled: true
    model_tier: balanced
    batch_size: 8
    baseline_filter:
      enabled: true
      p_high_threshold: 0.35
      poor_quality_grades: [C, D, F]

  enrichment_analysis:
    enabled: true
    model_tier: balanced
    prompt_file: prompts/enrichment_analysis.yaml
    description: >
      Identify valuable dimension joins to enrich main datasets
      with geographic, categorical, and reference data dimensions.
      Creates enriched views with no aggregations.

  sql_repair:
    enabled: true
    model_tier: fast
    max_repair_attempts: 2

# Cost controls
limits:
  max_output_tokens_per_request: 16000

# Privacy settings for data sent to LLM
privacy:
  max_sample_values: 10
  sensitive_patterns:
    - ".*email.*"
    - ".*phone.*"
    - ".*ssn.*"
    - ".*social_security.*"
    - ".*credit_card.*"
    - ".*password.*"
    - ".*secret.*"
    - ".*token.*"
    - ".*api_key.*"
